<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Babylon.js Akıllı Otopark</title>
    <style>
        /* ===== BASE LAYOUT ===== */
html, body {
    overflow: hidden;
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
}
#renderCanvas {
    width: 100%;
    height: 100vh;
    touch-action: none;
}

/* ===== UI PANEL ===== */
#ui {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 10;
    padding: 10px 12px;
    border-radius: 12px;
    background: rgba(10, 10, 14, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    user-select: none;
    min-width: 220px;
    
    /* Transitions & Hover */
    transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
}
#ui:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}
#ui:hover .value {
    color: #ffd700;
}

/* UI Children */
#ui .row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
}
#ui .label {
    font-size: 12px;
    opacity: 0.9;
    letter-spacing: 0.2px;
}
#ui .value {
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    opacity: 0.95;
    transition: color 0.2s ease;
}
#ui .check {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    font-size: 12px;
    opacity: 0.95;
}

/* ===== RANGE INPUTS ===== */
#carCount, #timeOfDay, #cameraMode {
    width: 100%;
    appearance: none;
    height: 6px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.18);
    outline: none;
    transition: filter 0.15s ease;
}
#carCount:hover, #timeOfDay:hover, #cameraMode:hover {
    filter: brightness(1.1);
}

/* Range Thumb - WebKit (Chrome, Edge, Safari) */
#carCount::-webkit-slider-thumb,
#timeOfDay::-webkit-slider-thumb,
#cameraMode::-webkit-slider-thumb {
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #ffd200;
    box-shadow: 0 0 0 4px rgba(255, 210, 0, 0.18);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
}
#carCount::-webkit-slider-thumb:hover,
#timeOfDay::-webkit-slider-thumb:hover,
#cameraMode::-webkit-slider-thumb:hover {
    transform: scale(1.3);
    box-shadow: 0 0 0 6px rgba(255, 210, 0, 0.25);
    background: #ffe033;
}
#carCount::-webkit-slider-thumb:active,
#timeOfDay::-webkit-slider-thumb:active,
#cameraMode::-webkit-slider-thumb:active {
    transform: scale(1.15);
    background: #ffed7a;
}

/* Range Thumb - Firefox */
#carCount::-moz-range-thumb,
#timeOfDay::-moz-range-thumb,
#cameraMode::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #ffd200;
    border: none;
    box-shadow: 0 0 0 4px rgba(255, 210, 0, 0.18);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
}
#carCount::-moz-range-thumb:hover,
#timeOfDay::-moz-range-thumb:hover,
#cameraMode::-moz-range-thumb:hover {
    transform: scale(1.3);
    box-shadow: 0 0 0 6px rgba(255, 210, 0, 0.25);
    background: #ffe033;
}

/* ===== CHECKBOX ===== */
#realTimeMode {
    cursor: pointer;
    transition: transform 0.15s ease;
}
#realTimeMode:hover {
    transform: scale(1.15);
}
    </style>
</head>
<body>
    <div id="ui">
        <div class="row">
            <div class="label">Cars</div>
            <div class="value"><span id="carCountValue">1</span></div>
        </div>
        <input id="carCount" type="range" min="0" max="50" step="1" value="1" />
        <div class="row" style="margin-top:10px;">
            <div class="label">Hour</div>
            <div class="value"><span id="timeOfDayValue">12:00</span></div>
        </div>
        <input id="timeOfDay" type="range" min="0" max="24" step="0.5" value="12" />
        <label class="check">
            <input id="realTimeMode" type="checkbox" />
            Real Time
        </label>
        <!-- Add this inside your #ui-panel div -->
        <div style="margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px;">
            <label for="cameraMode" style="display: block; font-size: 12px; margin-bottom: 5px;">View Mode</label>
            <input type="range" id="cameraMode" min="0" max="1" step="1" value="0" style="width: 100%;">
            <div id="cameraModeValue" style="font-size: 11px; margin-top: 3px; color: #ffd700; text-align: center;">Spectator</div>
        </div>
    </div>

    <!-- Sahnenin çizileceği Canvas -->
    <canvas id="renderCanvas"></canvas>

    <!-- Babylon.js Kütüphanesi -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <!-- Temel Araçlar (Örn: Kontroller, Fizik Motoru) -->
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    
    <!-- Proje mantığı -->
    <script type="module" src="./main.js"></script>
</body>
</html>
